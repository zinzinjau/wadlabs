<!DOCTYPE html>>
<html>
    <head>
        <title>GRID DEMO</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body {
                margin: 0;
                height: 100vh;
               font-size: 24px;
            }
            .container{
                display: grid;
                grid-template-columns: 0.2fr 1fr 0.2fr;
                grid-template-rows: 80px 1fr 40px;
                grid-template-areas:
                 "header header header" 
                 "l-aside main r-aside"
                 "footer footer footer";
                 gap: 8px ;
                 padding: 8px;
            }

            header{
                grid-area: header;
                background: pink;
            }

            #left-aside{
                grid-area: l-aside;
                background: green;

            }

            main{
                grid-area: main;
                background: blue;
                height: 79vh ;
            }

            #right-aside {
                grid-area: r-aside;
                background: purple;
            }

            footer {
                grid-area: footer;
                background: brown;
            }

        </style>
    </head>
    <body>
        <div class = "container">
            <header> Header</header>
            <aside id = "left"> Left Aside</aside>
            <main> Main</main>
            <aside id = "right"> Right  Aside</aside>
            <footer>footer</footer>
        </div>
    </body>
</html>
